<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>This is my second class</h1>

    <table border="1">
      <thead>
        <tr>
            <th colspan="2">heading 1</th>
            <th>heading 2</th>
            <th>heading 3</th>
        </tr>

      </thead>
      <!-- table head -->
      <tbody>
        <tr>
            <td rowspan="2">item 1</td>
            <td>item 2</td>
            <td>item 3</td>
        </tr>
        <tr>
            <td>item 4</td>
            <td>item 5</td>
            <td>item 6</td>
        </tr>
        <tr>
            <td>item 7</td>
            <td>item 8</td>
            <td>item 9</td>
        </tr>
      </tbody>
      <!-- table footer -->
      <tfoot>
        <tr>
            <td>item 10</td>
            <td>item 11</td>
            <td>item 12</td>
        </tr>

      </tfoot>
    </table>

     <a href="http://www.google.com" target="_blank">Go to google</a>
     <a href="./"></a>
     <!-- to add images in the webpage -->

      <!-- video -->
       <video src=""></video>
       <!-- audio -->

        <!-- form -->
